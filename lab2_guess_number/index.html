<!DOCTYPE html>
<html>
    <head>
        <title> Guess a Number </title>
        <link href="css/styles.css" rel="stylesheet">
        <meta charset="utf-8">
    </head>
    <body>

        <header>
            <h1>Guess the Number!</h1>
            <h2>Guess a number between 1 and 99 in seven attempts!</h2>
        </header>
        <br>
        <div id="main">
          Enter a guess: 
          <input type="text" id="playerGuess" size="5">         
          <button id="guessBtn"> Guess </button> <br>
          <button id="resetBtn"> Reset </button> 
          <div id="feedback"></div>
          <div>
            <span id="guesses"></span>
          </div>
        <div class="stat">
            <span>Attempts made: </span>
            <span id="attemptCount"></span>
        </div>
        
        <div class="stat">
            <span>Number of Wins: </span>
            <span id="winCount"></span>
        </div>
    
        <div class="stat">
            <span>Number of Losses: </span>
            <span id="lossCount"></span>
        </div>

        <script src="js/script.js"></script>

        <footer>
            <img src="img/CSUMBLogo.png" alt="California State University Monterey Bay"
            style="max-width: 100%; max-height: 240px;">

        </footer>
        
    </body>
</html>
