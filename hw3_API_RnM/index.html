<!DOCTYPE html>
<html>
    <head>
        <title> Rick and Morty: Character Index </title>
        <link href="css/styles.css" rel="stylesheet">
        <meta charset="utf-8">
    </head>
    <body>

        <form id="RMcharacterSearch">
            <label> Character Name:
                <input type="text" id="charName">
            </label>
            
            <label> Lifeform Class:
                <select id="speciesSelect" name="speciesSelect">
                    <option value="">Select Species</option>
                    <option value="human">Human</option>
                    <option value="humanoid">Humanoid</option>
                    <option value="alien">Alien</option>
                    <option value="animal">Animal</option>
                    <option value="myth">Mythological Creature</option>
                    <option value="robot">Robot</option>
                    <option value="poopybutthole">Poopybutthole</option>
                    <option value="unknown">Unknown</option>
                </select>
            </label><br>

            Gender:
            <label><input type="radio" name="gender" value="male"> Male</label>
            <label><input type="radio" name="gender" value="female"> Female</label>
            <label><input type="radio" name="gender" value="genderless"> Genderless</label>
            <label><input type="radio" name="gender" value="unknown"> Unknown</label><br>

            <button type="submit">Search</button>
        </form>

        <p id="validationMessage"></p>

        <div id="results"></div>

        <br><br>

    <script src="js/script.js"></script>

    </body>
</html>
